name: Bug 报告
description: 报告 MusicBox 的异常行为或崩溃
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。提交前请先阅读 [README 排错说明](https://github.com/darknessomi/musicbox#排错)，并确认使用的是最新版本。

        **请勿**在 Issue 中粘贴 Cookie、扫码登录输出或完整日志中的敏感信息。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么，以及对你造成了什么影响
      placeholder: 例如：播放某首歌时终端报错并退出，无法继续操作
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 尽量给出可重复的操作步骤
      placeholder: |
        1. 运行 `musicbox`
        2. 搜索并播放歌曲「……」
        3. 按 `Space` 暂停
        4. 出现报错
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为正确的结果应该是什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际看到的结果，包括终端报错信息（可脱敏）
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MusicBox 版本
      description: 运行 `musicbox --version` 的输出
      placeholder: "0.5.2"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - PyPI / pipx / uv tool install
        - 源码安装（uv sync / uv tool install .）
        - 其他
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python 版本
      description: 运行 `python3 --version` 或 `uv run python --version` 的输出
      placeholder: "Python 3.12.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "macOS 15 / Ubuntu 24.04 / Raspberry Pi OS"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: 终端与 Shell
      placeholder: "iTerm2 + zsh / GNOME Terminal + bash"
    validations:
      required: false

  - type: dropdown
    id: interface
    attributes:
      label: 问题界面
      description: 问题出现在 TUI 还是 CLI / daemon
      options:
        - TUI（`musicbox` 交互界面）
        - CLI 命令（如 `musicbox play`、`musicbox search`）
        - Daemon（`musicboxd`）
        - 不确定
    validations:
      required: true

  - type: textarea
    id: audio_check
    attributes:
      label: 音频依赖检查
      description: |
        若与播放相关，请说明 `mpg123`、`mpv` 是否已安装，以及同一终端下能否正常播放。
        可参考 README：先检查 `mpg123`，再检查其他终端下 `musicbox` 是否正常。
      placeholder: |
        - mpg123: 已安装 / 未安装 / 未测试
        - mpv: 已安装 / 未安装 / 未测试
        - 同一终端下 mpg123 播放测试: 正常 / 失败 / 未测试
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: |
        可从 `~/.local/share/netease-musicbox/musicbox.log` 提取相关片段（请脱敏）。
        未设置 `XDG_DATA_HOME` 时路径为 `~/.netease-musicbox/musicbox.log`。
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、配置片段、代理设置、特定歌曲 ID 等
    validations:
      required: false
