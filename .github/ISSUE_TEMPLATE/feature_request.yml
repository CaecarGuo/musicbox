name: 功能建议
description: 提出新功能或改进现有功能的建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出建议。请尽量说明**使用场景**和**期望行为**，便于维护者评估优先级与实现方式。

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 你现在遇到了什么不便，或希望解决什么问题？
      placeholder: 例如：在 CLI 模式下无法批量导出歌单链接，每次都要手动复制
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的功能
      description: 你希望 MusicBox 如何表现？可以描述交互流程或命令示例
      placeholder: |
        例如：新增 `musicbox playlist export <id> --format json`，导出歌单中所有歌曲的元数据
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - TUI 交互界面
        - CLI 命令
        - Daemon / Agent 集成
        - 配置项
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式，或目前有什么临时 workaround？
    validations:
      required: false

  - type: checkboxes
    id: willingness
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 PR 实现该功能
          required: false
        - label: 我可以协助测试或补充用例
          required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 参考项目、截图、相关 Issue 链接等
    validations:
      required: false
